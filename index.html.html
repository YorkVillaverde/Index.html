<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Portfolio</title>
</head>
<body style="
    font-family: Arial, sans-serif;
    text-align: center;
    margin: 0;
    padding: 40px;
    background: linear-gradient(to right, #dbeafe, #f0f9ff);
  ">

  <!-- Header -->
  <h1 style="color: #1e3a8a; font-size: 42px;">
    YORK OWEL VILLAVERDE
  </h1>

  <!-- Profile Picture -->
  <img 
    src="https://uploads.onecompiler.io/44r5ypm43/44r5xszrw/IMG_0176.jpeg" 
    alt="Profile Picture"
    style="
      width: 200px;
      height: 200px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #1e3a8a;
      margin-top: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    "
  />

  <!-- Portfolio Description -->
  <p style="
      max-width: 600px;
      margin: 30px auto;
      font-size: 18px;
      line-height: 1.6;
      color: #374151;
      background-color: rgba(255,255,255,0.7);
      padding: 20px;
      border-radius: 10px;
    ">
    Hello! I am a gamer who loves listening to music and do a little bit of coding, I also enjoy playing basketball. I'd like to improve my knowledge to cybersecurity.
  </p>

  <!-- Hobbies List -->
  <ul style="
      list-style: none;
      padding: 0;
      margin: 0 auto;
      font-size: 18px;
      color: #1f2937;
      background-color: rgba(255,255,255,0.7);
      display: inline-block;
      padding: 20px 40px;
      border-radius: 10px;
    ">
    <h2>HOBBIES</h2>
    <li style="margin: 10px 0;">Playing Games</li>
    <li style="margin: 10px 0;">Listening Music</li>
    <li style="margin: 10px 0;">Playing Basketball</li>
    <li style="margin: 10px 0;"></li>
  </ul>

</body>
</html>
